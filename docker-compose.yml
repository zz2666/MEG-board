services:
  postgres:
    image: postgres:16-alpine
    container_name: earnings-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: earnings_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - earnings-dashboard-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d earnings_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  earnings-dashboard-postgres:
